<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBS Login Test</title>
<style>
body{font-family:sans-serif;background:#1a3a6b;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:12px;padding:2rem;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
h2{margin:0 0 1.5rem;color:#1a3a6b;text-align:center}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box}
button{width:100%;padding:11px;background:#1a3a6b;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
button:hover{background:#122d57}
#msg{margin-top:10px;padding:8px;border-radius:6px;font-size:13px;text-align:center;display:none}
.err{background:#fee;color:#c00;border:1px solid #fcc}
.ok{background:#efe;color:#060;border:1px solid #cfc}
#dbg{margin-top:8px;font-size:11px;color:#888;text-align:center;min-height:16px}
</style>
</head>
<body>
<div class="box">
  <h2>👑 RBS Portal</h2>
  <input type="email" id="em" placeholder="Email" value="admin@rbs.co.uk">
  <input type="password" id="pw" placeholder="Password" value="Admin@RBS2026">
  <button onclick="tryLogin()">Sign In</button>
  <div id="msg"></div>
  <div id="dbg">Ready</div>
</div>
<script>
var USERS = [
  {email:'admin@rbs.co.uk', password:'Admin@RBS2026', name:'Admin', role:'admin'},
  {email:'hr@rbs.co.uk',    password:'HR@RBS2026',    name:'HR Manager', role:'hr'}
];

function dbg(t){ document.getElementById('dbg').textContent = t; }
function msg(t,ok){
  var el=document.getElementById('msg');
  el.textContent=t; el.className=ok?'ok':'err'; el.style.display='block';
}

function tryLogin(){
  var email = document.getElementById('em').value.trim().toLowerCase();
  var pass  = document.getElementById('pw').value.trim();
  dbg('Trying: '+email);
  
  if(!email||!pass){ msg('Enter email and password','err'); return; }
  
  var found = USERS.find(function(u){ return u.email===email && u.password===pass; });
  
  if(found){
    dbg('Found: '+found.name);
    msg('✅ SUCCESS! Logged in as: '+found.name+' ('+found.role+')', true);
  } else {
    dbg('No match for: '+email);
    msg('❌ Wrong email or password', false);
  }
}
</script>
</body>
</html>
